sequence_length: 200
step_size: 30
model_name: 'asdmotion.pth'
child_detection: false
classification_threshold: 0.85
num_person_in: 1
num_person_out: 1
# If set (path to tic_holistic-style *_landmarks.json), pose is read from Holistic JSON
# (33 joints -> COCO-17) and OpenPose is skipped. CLI --holistic-json overrides this.
holistic_landmarks_json: null
open_pose_path: 'A:/tic_baseline/openpose'
mmaction_path: 'A:/tic_baseline/mmaction2'
mmlab_python_path: 'D:/miniconda3/envs/open-mmlab/python.exe'
# Physical GPU index for MMAction2 test + (when used) OpenPose / child detector. CLI ``-gpu`` overrides.
# Use ``-1`` to force CPU for the MMAction subprocess (CUDA_VISIBLE_DEVICES cleared).
gpu: 0
